<script>
(function() {
  if (!window.location.pathname.includes('/content/Home/')) return;

  function attachSearch() {
    var btn = document.getElementById('tejasSearchBtn');
    var input = document.getElementById('tejasSearchInput');
    if (!btn || !input) return; /* bail if elements arent there yet */

    function doSearch() {
      var val = input.value.trim();
      if (val) {
        window.location.href = '/portal/category/Search/0?search=' + encodeURIComponent(val) + '&page=1';
      }
    }

    btn.addEventListener('click', doSearch);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });
  }

  var observer = new MutationObserver(function() {
    if (document.getElementById('tejasSearchBtn') && document.getElementById('tejasSearchInput')) {
      observer.disconnect();
      attachSearch();
    }
  });

  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
