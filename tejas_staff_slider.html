<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"canada-type-gibson",sans-serif}
:root{--off-black:#232121;--dark-orange:#DD3E08;--orange:#C86D20;--light-orange:#DE7536;--gray-1:#F2EFED;--gray-2:#D9D4D1;--gray-3:#A89F9B;--off-white:#f5f5f5;--navy:#031726;--br:4px}
.staff-slider-section{width:100%;background:var(--off-black);border-top:8px solid var(--orange);overflow:hidden;position:relative;padding:60px clamp(24px,4vw,60px) 80px}
.staff-slider-label{font-size:12px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--light-orange);margin-bottom:10px}
.staff-slider-heading{font-size:clamp(26px,3vw,36px);font-weight:600;color:white;line-height:1.15;margin-bottom:48px}
.slides-wrapper{overflow:hidden}
.slides-track{display:flex;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1)}
.staff-card{flex:0 0 100%;display:grid;grid-template-columns:280px 1fr;gap:48px;align-items:center}
.staff-portrait{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center top;border-radius:var(--br);border:2px solid var(--gray-2);flex-shrink:0;background-color:#2a2826}
.staff-info{display:flex;flex-direction:column;gap:16px}
.staff-name{font-size:clamp(22px,2.5vw,32px);font-weight:600;color:white;line-height:1.1}
.staff-title{font-size:14px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--orange)}
.staff-divider{width:36px;height:2px;background:var(--orange)}
.staff-bio{font-size:clamp(15px,1.1vw,17px);font-weight:300;line-height:1.75;color:var(--gray-3)}
.staff-detail{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--gray-2)}
.staff-detail-icon{color:var(--orange);font-size:12px;width:16px;text-align:center;font-family:"Font Awesome 5 Free";font-weight:900}
.slider-footer{display:flex;align-items:center;justify-content:space-between;margin-top:48px}
.dots{display:flex;gap:8px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.35);cursor:pointer;transition:all 0.25s ease}
.dot.active{background:var(--orange);border-color:var(--orange);transform:scale(1.25)}
.arrow-btns{display:flex;gap:10px}
.arrow-btn{width:42px;height:42px;border-radius:50%;background:transparent;border:1.5px solid rgba(255,255,255,0.25);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease;line-height:1}
.arrow-btn:hover{background:var(--orange);border-color:var(--orange)}
.slide-counter{font-size:13px;color:var(--gray-3);letter-spacing:0.05em}
@media(max-width:680px){
  .staff-card{grid-template-columns:1fr;gap:24px}
  .staff-portrait{aspect-ratio:1/1;max-width:200px}
}
</style>
